<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MACDC Drain Commissioner Map</title>

    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<div id="app">

    <header>
        <h1>Michigan Drain Commissioners</h1>
        <p>Find your county drain commissioner.</p>
    </header>

    <main id="map-layout">

        <aside id="sidebar">

            <input
                id="search"
                type="text"
                placeholder="Search county or commissioner..."
            >

            <div id="county-list"></div>

        </aside>

        <section id="map-container">

            <!-- SVG loads here -->

        </section>

        <aside id="details">

            <h2>Select a County</h2>

            <div id="details-content">

                Click a county on the map.

            </div>

        </aside>

    </main>

</div>

<script src="assets/js/script.js"></script>

</body>
</html>
